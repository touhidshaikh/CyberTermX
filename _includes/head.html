<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ site.title }}</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap" rel="stylesheet">
<style>
    :root { --neon-green: #00ff41; --dark-bg: #000500; }
    body { background-color: var(--dark-bg); color: var(--neon-green); font-family: 'Fira Code', monospace; overflow-x: hidden; margin: 0; }
    canvas { display: block; position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }
    .terminal-window {
        background: rgba(0, 10, 0, 0.9); border: 1px solid var(--neon-green);
        box-shadow: 0 0 15px rgba(0, 255, 65, 0.1); backdrop-filter: blur(8px);
    }
    .crt-scanline {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
        background-size: 100% 4px; pointer-events: none; z-index: 100;
    }
    .scanline-anim {
        width: 100%; height: 2px; background: rgba(0, 255, 0, 0.1);
        position: fixed; top: 0; z-index: 101; animation: scanline 8s linear infinite;
    }
    @keyframes scanline { 0% { top: -5%; } 100% { top: 105%; } }
    .highlight { color: #fff; text-shadow: 0 0 5px var(--neon-green); }
    .hover-box:hover { background: rgba(0, 255, 65, 0.05); transform: translateY(-2px); transition: all 0.3s ease; }
    .twitter-wrapper { filter: invert(1) hue-rotate(100deg) brightness(0.7) contrast(1.5); transition: 0.5s; }
    .twitter-wrapper:hover { filter: invert(1) hue-rotate(100deg) brightness(0.9) contrast(1.2); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--neon-green); }
</style>
