<script>
    // ==========================================
    // 1. MATRIX BACKGROUND ANIMATION
    // ==========================================
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    
    // Ensure canvas resizes dynamically with the window
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const chars = '01ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789ｦｱｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ';
    let drops = Array(Math.floor(canvas.width / 14)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#0F0';
        ctx.font = '14px monospace';
        
        for (let i = 0; i < drops.length; i++) {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(text, i * 14, drops[i] * 14);
            if (drops[i] * 14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 35);


    // ==========================================
    // 2. WORDPRESS RSS FEED (LATEST INTEL)
    // ==========================================
    async function fetchBlog() {
        try {
            // Assumes site.url is set in _config.yml (e.g., https://touhidshaikh.com)
            const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url={{ site.url }}/feed/&api_key={{ site.rss2json_api_key }}');
            const data = await response.json();
            const container = document.getElementById('blog-feed');
            
            if (!container) return; // Prevent errors if section isn't on the page
            
            if (data.status === 'ok' && data.items.length > 0) {
                container.innerHTML = '';
                data.items.slice(0, 3).forEach(item => {
                    // Extract just the date part (YYYY-MM-DD), Title and Description
                    const date = item.pubDate.split(' ')[0];
                    container.innerHTML += `
                        <a href="${item.link}" target="_blank" class="block border-l-2 border-purple-900 bg-purple-950/10 pl-4 py-3 hover:bg-purple-900/20 transition group">
                            <span class="text-[10px] text-purple-400 font-mono block mb-1 uppercase">PACKET_DATE: ${date}</span>
                            <span class="text-sm text-white font-bold group-hover:text-purple-300 transition">${item.title}</span>
                            <p class="text-[10px] opacity-70 mt-1">${ item.description }</p>
                        </a>`;
                });
            } else {
                container.innerHTML = "<span class='text-yellow-500 text-xs'>No intel found on remote host.</span>";
            }
        } catch (e) {
            const container = document.getElementById('blog-feed');
            if(container) container.innerHTML = "<span class='text-red-500 text-xs'>ERROR: Failed to establish handshake with feed.</span>";
        }
    }
    fetchBlog();


    // ==========================================
    // 3. INTERACTIVE TERMINAL LOGIC
    // ==========================================
    let termData = {};
    const cmdHistory = [];
    
    // Fetch dynamic data from Jekyll (JSON Bridge)
    fetch('{{ "/terminal.json" | relative_url }}')
        .then(response => response.json())
        .then(data => { termData = data; })
        .catch(err => console.error("Terminal JSON load failed. Ensure terminal.json exists.", err));

    const termInput = document.getElementById('term-input');
    const termOutput = document.getElementById('term-output');

    if (termInput && termOutput) {
        termInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const cmd = this.value.trim().toLowerCase();
                this.value = '';
                
                if (cmd !== '') cmdHistory.push(cmd);
                
                // Display User Input
                const domain = termData.domain || '{{ site.url | remove: "https://" | remove: "http://" }}';
                termOutput.innerHTML += `<div><span class="text-cyan-500">guest@${domain}:~$</span> <span class="text-white">${cmd}</span></div>`;
                
                let response = '';
                
                // Command Routing
                switch(cmd) {
                    case 'help':
                        response = 'Available commands:<br>- whoami<br>- id<br>- ls<br>- cat [file]<br>- certs<br>- neofetch<br>- history<br>- clear<br>- hostname<br>- download';
                        break;
                    case 'whoami':
                        response = `${termData.name || '{{ site.author.name }}'} | ${termData.role || '{{ site.author.role }}'}`;
                        break;
                    case 'hostname':
                        response = domain;
                        break;
                    case 'id':
                        response = 'uid=1000(guest) gid=1000(guest) groups=1000(guest)';
                        break;
                    case 'certs':
                        response = '{{ site.certifications | map: "name" | join: ", " }}';
                        break;
                    case 'ls':
                    case 'ls -la':
                    case 'll':
                        response = 'skills.txt &nbsp;&nbsp;&nbsp; cve_list.txt &nbsp;&nbsp;&nbsp; <span class="text-blue-400">projects/</span> &nbsp;&nbsp;&nbsp; <span class="text-green-400">resume.pdf</span>';
                        break;
                    case 'cat skills.txt':
                        response = termData.skills ? termData.skills.map(s => `[+] ${s}`).join('<br>') : 'No skills found.';
                        break;
                    case 'cat cve_list.txt':
                        response = termData.cves ? termData.cves.join('<br>') : 'No CVEs found.';
                        break;
                    case 'download':
                    case 'download resume.pdf':
                        response = '[+] Initializing secure file transfer...<br>[+] Downloading Resume...';
                        // Ensure you place a resume.pdf in the root directory of your repo
                        window.open('{{ site.url }}/resume.pdf', '_blank');
                        break;
                    case 'neofetch':
                        response = `
                            <div class="flex mt-2">
                                <pre class="text-green-500 mr-4 font-bold leading-tight">\\ \\\n \\ \\\n  > \\\n / /\n/ /\n                                </pre>
                                <div>
                                    <span class="text-white font-bold">${domain}</span><br>
                                    -----------------<br>
                                    <span class="text-green-400">OS:</span> Cyber_OS_v2.0<br>
                                    <span class="text-green-400">Kernel:</span> 13.3.7-exploit<br>
                                    <span class="text-green-400">Packages:</span> ${termData.cves ? termData.cves.length : 0} (CVEs)<br>
                                    <span class="text-green-400">Shell:</span> bash<br>
                                    <span class="text-green-400">Resolution:</span> ${window.innerWidth}x${window.innerHeight}
                                </div>
                            </div>`;
                        break;
                    case 'history':
                        response = cmdHistory.map((c, i) => `${i+1}  ${c}`).join('<br>');
                        break;
                    case 'clear':
                        termOutput.innerHTML = '';
                        break;
                    default:
                        if (cmd.startsWith('sudo')) {
                            response = `<span class="text-red-500">guest is not in the sudoers file. This incident will be reported.</span>`;
                        } else if (cmd.startsWith('cat ')) {
                            const file = cmd.split(' ')[1];
                            response = `<span class="text-red-500">cat: ${file}: Permission denied or file not found</span>`;
                        } else if (cmd !== '') {
                            response = `<span class="text-red-500">bash: ${cmd}: command not found</span>`;
                        }
                }

                if (response) {
                    termOutput.innerHTML += `<div class="text-cyan-300 mt-1 mb-3 ml-2">${response}</div>`;
                }
                termOutput.scrollTop = termOutput.scrollHeight;
            }
        });
    }
</script>
