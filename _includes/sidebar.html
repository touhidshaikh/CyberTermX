<section class="terminal-window p-5">
    <h3 class="text-xs font-bold text-white mb-3 bg-green-900/50 px-2 py-1 inline-block">SYSTEM.PROFILE</h3>
    <p class="text-sm leading-relaxed">{{ site.description }}</p>
    <details class="mt-4 cursor-pointer outline-none">
        <summary class="text-[10px] text-green-500 hover:text-green-300 font-bold select-none">>> REVEAL_PGP_PUBLIC_KEY</summary>
        <div class="bg-black/60 p-3 mt-2 text-[8px] overflow-x-auto text-green-800 border border-green-900 font-mono leading-tight">
            {{ site.author.pgp_public_key | newline_to_br }}
        </div>
    </details>
</section>

<section class="terminal-window p-4">
    <h3 class="border-b border-green-900 mb-3 pb-1 text-green-100 uppercase text-sm"># Identity</h3>
    <ul class="text-sm space-y-2">
        <li><span class="opacity-50">LOCATION:</span> {{ site.author.location }}</li>
        <li><span class="opacity-50">GITHUB:</span> <a href="https://github.com/{{ site.social.github }}" class="underline">{{ site.social.github }}</a></li>
    </ul>
</section>

<section class="terminal-window p-4">
    <h3 class="border-b border-green-900 mb-3 pb-1 text-green-100 uppercase text-sm"># Specialization</h3>
    <div class="flex flex-wrap gap-2">
        {% for skill in site.skills %}
        <span class="text-[10px] border border-green-700 p-1">{{ skill }}</span>
        {% endfor %}
    </div>
</section>
